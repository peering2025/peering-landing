name: SEO 자동 콘텐츠 업로드

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: '실제 반영할까요? (false면 실제 게시)'
        required: true
        default: 'false'
        type: choice
        options: ['true', 'false']

  schedule:
    - cron: '0 0 * * 1,3,5' # 월·수(정보성), 금(피어링 팁) 한국시간 오전 9시

jobs:
  generate-content:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Node.js 설정
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          # cache 설정을 삭제하여 경로 오류를 원천 차단합니다.

      - name: 스크립트 의존성 설치
        run: |
          cd scripts
          npm install

      - name: SEO 콘텐츠 생성
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          node scripts/generate-seo-content.mjs --dry-run=${{ github.event.inputs.dry_run || 'false' }}

      - name: 커밋 & 푸시
        if: github.event.inputs.dry_run != 'true'
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add src/content/news.ts src/content/news-en.ts
          git diff --quiet && git diff --staged --quiet || (git commit -m "feat: SEO 자동 콘텐츠 업로드 (KO+EN)" && git push)