# ─────────────────────────────────────────────────────────────────────────────
# 피어링 SEO 자동 콘텐츠 업로드
# ─────────────────────────────────────────────────────────────────────────────
# 스케줄 : 매주 월·수·금 KST 09:00 (= UTC 00:00)
# 동작   : Claude API로 특수교육 SEO 글 생성 → news.ts 수정 → 커밋·푸시
#
# 필요한 GitHub Secrets:
#   ANTHROPIC_API_KEY  — Anthropic Console에서 발급한 API 키
#                        (Settings → Secrets and variables → Actions → New secret)
# ─────────────────────────────────────────────────────────────────────────────

name: SEO 자동 콘텐츠 업로드

on:
  schedule:
    # 월(1), 수(3), 금(5) UTC 00:00 = KST 09:00
    - cron: '0 0 * * 1,3,5'

  # GitHub Actions 탭에서 수동 실행 가능 (테스트용)
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (커밋 없이 콘텐츠만 생성·확인)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

# GITHUB_TOKEN에 커밋·푸시 권한 부여
permissions:
  contents: write

jobs:
  generate-and-upload:
    name: 콘텐츠 생성 및 업로드
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      # ── 1. 최신 코드 체크아웃 ────────────────────────────────────────────────
      - name: 코드 체크아웃
        uses: actions/checkout@v4
        with:
          # 커밋 전 pull을 위해 전체 히스토리 필요
          fetch-depth: 0

      # ── 2. Node.js 설정 ───────────────────────────────────────────────────────
      - name: Node.js 설정
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          # scripts/package.json 기반으로 캐싱
          cache: 'npm'
          cache-dependency-path: scripts/package-lock.json

      # ── 3. 스크립트 의존성 설치 (@anthropic-ai/sdk) ───────────────────────────
      - name: 스크립트 의존성 설치
        run: npm install
        working-directory: scripts

      # ── 4. Claude API로 SEO 콘텐츠 생성 → news.ts 수정 ───────────────────────
      - name: SEO 콘텐츠 생성
        id: generate
        run: node generate-seo-content.mjs
        working-directory: scripts
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      # ── 5. 수정된 news.ts 내용 미리보기 (디버깅용) ───────────────────────────
      - name: 변경사항 미리보기
        run: git diff src/content/news.ts | head -80

      # ── 6. 커밋 & 푸시 (dry_run=true 이면 스킵) ──────────────────────────────
      - name: 커밋 & 푸시
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          git config user.name  "Peering SEO Bot"
          git config user.email "peering2025@gmail.com"

          git add src/content/news.ts

          # 변경사항이 있을 때만 커밋
          if git diff --staged --quiet; then
            echo "ℹ️  변경사항 없음 — 커밋을 건너뜁니다."
          else
            git commit -m "feat: SEO 신규 콘텐츠 업로드 ($(date +'%Y-%m-%d'))"
            git push origin master
            echo "✅ 커밋·푸시 완료"
          fi

      # ── 7. Dry run 안내 ───────────────────────────────────────────────────────
      - name: Dry run 안내
        if: ${{ github.event.inputs.dry_run == 'true' }}
        run: |
          echo "🧪 Dry run 모드 — 커밋 없이 콘텐츠 생성만 수행했습니다."
          echo "   위의 'Diff 미리보기' 단계에서 생성된 내용을 확인하세요."
